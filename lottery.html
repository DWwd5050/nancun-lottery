<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>卫生区域抽号 — 脱水机房</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f5f4f0;min-height:100vh;color:#1a1a18;font-size:15px;line-height:1.6;
}
.page{max-width:460px;margin:0 auto;padding:32px 18px 64px}

.hd{text-align:center;margin-bottom:28px}
.hd h1{font-size:21px;font-weight:500;color:#1a1a18}
.hd p{font-size:13px;color:#888780;margin-top:5px}

.card{background:#fff;border:0.5px solid #d3d1c7;border-radius:14px;padding:20px 20px;margin-bottom:14px}
.card-title{font-size:12px;color:#888780;margin-bottom:14px;letter-spacing:.04em}

/* input */
.field{margin-bottom:14px}
label{display:block;font-size:13px;color:#5f5e5a;margin-bottom:6px}
input[type=text]{
  width:100%;height:48px;border:0.5px solid #d3d1c7;border-radius:10px;
  padding:0 16px;font-size:16px;background:#fff;color:#1a1a18;outline:none;
  -webkit-appearance:none;
}
input[type=text]:focus{border-color:#888780}
input[type=text]::placeholder{color:#c4c2b9}

/* btn */
.btn{
  display:block;width:100%;height:50px;border-radius:12px;
  border:0.5px solid #1a1a18;background:#1a1a18;color:#fff;
  font-size:16px;cursor:pointer;margin-top:4px;
  -webkit-tap-highlight-color:transparent;letter-spacing:.04em;
}
.btn:active{opacity:.82}
.btn.ghost{background:#fff;color:#1a1a18;border-color:#d3d1c7}

/* err */
.err{font-size:13px;color:#a32d2d;padding:6px 0 2px;display:none}
.err.show{display:block}

/* result card */
.result-wrap{display:none}
.result-wrap.show{display:block}

.num-circle{
  width:108px;height:108px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 18px;
}
.num-big{font-size:56px;font-weight:500;line-height:1}
.num-lbl{font-size:12px;margin-top:2px;opacity:.8}

.zone-name{font-size:18px;font-weight:500;text-align:center;margin-bottom:7px}
.zone-detail{font-size:13px;color:#5f5e5a;text-align:center;line-height:1.85}
.divider{border:none;border-top:0.5px solid #ebe9e4;margin:16px 0}
.meta-txt{font-size:12px;color:#b4b2a9;text-align:center}

/* colors */
.z1{background:#e6f1fb;color:#185fa5}
.z2{background:#eaf3de;color:#3b6d11}
.z3{background:#faeeda;color:#854f0b}
.z4{background:#fbeaf0;color:#993556}
.z5{background:#eeedfe;color:#534ab7}
.z6{background:#e1f5ee;color:#0f6e56}

/* zone ref list */
.zone-list{display:flex;flex-direction:column;gap:10px}
.zone-row{display:flex;align-items:flex-start;gap:10px}
.zb{flex-shrink:0;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500}
.zt strong{font-size:13px;font-weight:500;display:block;line-height:1.4}
.zt span{font-size:12px;color:#888780}

/* anim */
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.pop{animation:popIn .25s ease}
</style>
</head>
<body>
<div class="page">
  <div class="hd">
    <h1>卫生区域抽号</h1>
    <p>脱水机房 · 国电银河水务</p>
  </div>

  <!-- 输入姓名 -->
  <div class="card" id="inputCard">
    <div class="card-title">输入您的姓名，查看本次分配区域</div>
    <div class="field">
      <label>您的姓名</label>
      <input type="text" id="nameInput" placeholder="例：张学新" maxlength="10" autocomplete="off" inputmode="text">
    </div>
    <div class="err" id="errMsg"></div>
    <button class="btn" id="btnSubmit">查看我的区域</button>
  </div>

  <!-- 结果 -->
  <div class="result-wrap" id="resultWrap">
    <div class="card pop" style="text-align:center;padding:28px 20px 22px">
      <div class="num-circle" id="numCircle">
        <div class="num-big" id="numBig">—</div>
        <div class="num-lbl">号区域</div>
      </div>
      <div class="zone-name" id="zoneName"></div>
      <div class="zone-detail" id="zoneDetail"></div>
      <hr class="divider">
      <div class="meta-txt" id="metaTxt"></div>
    </div>

    <div class="card">
      <div class="card-title">全部区域说明</div>
      <div class="zone-list">
        <div class="zone-row"><div class="zb z1">1</div><div class="zt"><strong>污泥泵区域</strong><span>地面、设备、窗台</span></div></div>
        <div class="zone-row"><div class="zb z2">2</div><div class="zt"><strong>1号脱水机区域</strong><span>设备、地面、排水渠、窗台</span></div></div>
        <div class="zone-row"><div class="zb z3">3</div><div class="zt"><strong>2号脱水机区域</strong><span>设备、地面、排水渠、窗台</span></div></div>
        <div class="zone-row"><div class="zb z4">4</div><div class="zt"><strong>加药机区域</strong><span>设备、地面、窗台、排水渠</span></div></div>
        <div class="zone-row"><div class="zb z5">5</div><div class="zt"><strong>地面区域</strong><span>门口地面、设备操作间、杂物间、窗台</span></div></div>
        <div class="zone-row"><div class="zb z6">6</div><div class="zt"><strong>巴氏槽区域</strong><span>南侧水泥路、出水口水泥路、脱水机房门口</span></div></div>
      </div>
    </div>

    <button class="btn ghost" id="btnAgain">重新查询</button>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
//  区域数据
// ────────────────────────────────────────────────
const ZONES = [
  {id:1, name:"污泥泵区域",    detail:"地面、设备、窗台",                        cls:"z1"},
  {id:2, name:"1号脱水机区域", detail:"设备、地面、排水渠、窗台",                cls:"z2"},
  {id:3, name:"2号脱水机区域", detail:"设备、地面、排水渠、窗台",                cls:"z3"},
  {id:4, name:"加药机区域",    detail:"设备、地面、窗台、排水渠",                cls:"z4"},
  {id:5, name:"地面区域",      detail:"门口地面、设备操作间、杂物间、窗台",      cls:"z5"},
  {id:6, name:"巴氏槽区域",    detail:"南侧水泥路、出水口水泥路、脱水机房门口",  cls:"z6"},
];

// ────────────────────────────────────────────────
//  本次抽号结果（固定，由管理员生成）
//  抽号时间：2026-05-06
// ────────────────────────────────────────────────
const RESULT = {
  "杨生康": 3,
  "高锋彩": 1,
  "冷坚俊": 5,
  "张学新": 6,
  "王修光": 2,
  "王孝勇": 4
};
const DRAW_DATE = "2026-05-06";

// ────────────────────────────────────────────────
//  DOM
// ────────────────────────────────────────────────
const nameInput  = document.getElementById("nameInput");
const btnSubmit  = document.getElementById("btnSubmit");
const errMsg     = document.getElementById("errMsg");
const inputCard  = document.getElementById("inputCard");
const resultWrap = document.getElementById("resultWrap");
const numCircle  = document.getElementById("numCircle");
const numBig     = document.getElementById("numBig");
const zoneName   = document.getElementById("zoneName");
const zoneDetail = document.getElementById("zoneDetail");
const metaTxt    = document.getElementById("metaTxt");
const btnAgain   = document.getElementById("btnAgain");

function showErr(msg){ errMsg.textContent=msg; errMsg.classList.add("show"); }
function clearErr(){ errMsg.classList.remove("show"); }

btnSubmit.addEventListener("click", query);
nameInput.addEventListener("keydown", e => { if(e.key==="Enter") query(); });

function query(){
  const raw  = nameInput.value.trim();
  clearErr();
  if(!raw){ showErr("请输入您的姓名"); nameInput.focus(); return; }

  // 精确匹配
  let hit = raw in RESULT ? raw : null;
  // 模糊匹配（去空格、全半角）
  if(!hit){
    const norm = raw.replace(/\s/g,"");
    hit = Object.keys(RESULT).find(k => k.replace(/\s/g,"") === norm) || null;
  }

  if(!hit){
    showErr(`未找到"${raw}"的记录，请确认姓名与登记一致`);
    return;
  }

  const zid = RESULT[hit];
  const z   = ZONES[zid - 1];

  inputCard.style.display = "none";
  resultWrap.classList.add("show");

  // 刷新动画
  const card = resultWrap.querySelector(".card");
  card.classList.remove("pop");
  void card.offsetWidth;
  card.classList.add("pop");

  numCircle.className = "num-circle " + z.cls;
  numBig.textContent  = zid;
  zoneName.textContent  = z.name;
  zoneName.style.color  = window.getComputedStyle(numCircle).color;
  zoneDetail.textContent = z.detail;
  metaTxt.textContent    = hit + "  ·  " + DRAW_DATE;
}

btnAgain.addEventListener("click", () => {
  inputCard.style.display = "";
  resultWrap.classList.remove("show");
  nameInput.value = "";
  clearErr();
  nameInput.focus();
});
</script>
</body>
</html>
